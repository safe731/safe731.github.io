<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Ready</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.box{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

button{
padding:12px 25px;
cursor:pointer;
font-size:16px;
}

.info{
margin:15px 0;
font-size:18px;
}

</style>

</head>

<body>

<div class="box">

<h2>Download Ready</h2>

<div class="info">
File Name:
<b id="fileName">Loading...</b>
</div>

<div class="info">
Size:
<b id="fileSize">Loading...</b>
</div>

<div class="info">
Downloaded:
<b id="downloads">0</b>
</div>

<br>

<button id="downloadBtn">
Download Now
</button>

</div>

<script>

const params =
new URLSearchParams(location.search);

const id = params.get("id");

let finalUrl = "";

async function loadData(){

const res = await fetch(
"https://s.safe731-shortlink-api.workers.dev/link/"+id
);

const data = await res.json();

finalUrl = data.url;

document.getElementById("fileName")
.innerText = data.fileName;

document.getElementById("fileSize")
.innerText = data.fileSize;

document.getElementById("downloads")
.innerText = data.downloads + "+";

}

document.getElementById("downloadBtn")
.onclick = ()=>{

window.location.href =
finalUrl;

};

loadData();

</script>

</body>
</html>
